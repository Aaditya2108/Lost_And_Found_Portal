databases:
  - name: lost-found-db
    plan: free
    databaseName: lostandfound
    user: lostfound

services:
  - type: web
    name: lost-found-portal
    plan: free
    runtime: python
    rootDir: django_app
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lost-found-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
